# Integration Test Agent Config
# WebSocket 端口 = HTTP 端口 + 1
server:
  url: "ws://127.0.0.1:18081/agent"
  token: "test-agent-token"

# Register models that the tests expect
models:
  - id: "gpt-4"
    provider: "openai"
    endpoint: "http://127.0.0.1:9999"
    apiKey: "test-key"

  - id: "text-embedding-ada-002"
    provider: "openai"
    endpoint: "http://127.0.0.1:9999"
    apiKey: "test-key"

  - id: "text-davinci-003"
    provider: "openai"
    endpoint: "http://127.0.0.1:9999"
    apiKey: "test-key"

reconnect:
  enabled: false